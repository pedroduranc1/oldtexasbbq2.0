<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="#1a365d"/>

  <!-- BBQ Grill lines -->
  <g stroke="#d69e2e" stroke-width="8" stroke-linecap="round">
    <line x1="100" y1="280" x2="412" y2="280"/>
    <line x1="100" y1="310" x2="412" y2="310"/>
    <line x1="100" y1="340" x2="412" y2="340"/>
    <line x1="100" y1="370" x2="412" y2="370"/>
